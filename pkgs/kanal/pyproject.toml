[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name    = "kanal"
version = "0.1.0"
description = "notenix update-channel switcher — GUI and CLI"
requires-python = ">=3.11"

[project.scripts]
kanal    = "kanal.__main__:main"
kanalctl = "kanal.__main__:main_ctl"

[tool.setuptools]
packages = ["kanal", "kanal.gui"]
